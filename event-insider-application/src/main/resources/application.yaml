app:
  jwt:
    secret: ${APP_JWT_SECRET:0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
    expiration-seconds: 3600
  security:
    require-sso-token: ${APP_REQUIRE_SSO_TOKEN:false}
    sso-token: ${APP_SSO_TOKEN:dev-sso-token}
  booking:
    hold-duration: PT15M
    stale-hold-scan-interval-ms: 60000
    stale-hold-page-size: 50
  payment:
    webhook-secret: ${APP_PAYMENT_WEBHOOK_SECRET:dev-webhook-secret}
  kafka:
    topics:
      booking: ${APP_KAFKA_TOPIC_BOOKING:booking.events}
      slack: ${APP_KAFKA_TOPIC_SLACK:slack.alerts}
  alert:
    contact-team: ${APP_ALERT_CONTACT_TEAM:Alpha}
    escalate: ${APP_ALERT_ESCALATE:Deepak More}
  rate-limit:
    enabled: ${APP_RATE_LIMIT_ENABLED:true}
    max-requests: ${APP_RATE_LIMIT_MAX_REQUESTS:100}
    window: ${APP_RATE_LIMIT_WINDOW:PT15M}
    counter-key-prefix: ${APP_RATE_LIMIT_COUNTER_PREFIX:rl:ip:}
    blacklist-redis-key: ${APP_RATE_LIMIT_BLACKLIST_REDIS_KEY:rl:blacklist:ips}
    blacklist-bootstrap-ips: ${APP_RATE_LIMIT_BLACKLIST_BOOTSTRAP_IPS:}

spring:
  datasource:
    hikari:
      leak-detection-threshold: 2000
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: ${REDIS_TIMEOUT:2s}
      repositories:
        enabled: false
  application:
    name: event-insider
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] [requestId=%X{requestId:-}] [userId=%X{userId:-}] %logger{36} - %msg%n"
  level:
    org.flywaydb: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE

management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
    metrics:
      enabled: true
    info:
      enabled: true
  health:
    redis:
      enabled: true
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

info:
  application:
    name: ${spring.application.name}